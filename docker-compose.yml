services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379"
    volumes:
      - falkordb-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cih-server:
    image: phuchoang29/yummy-cih:latest
    ports:
      - "8080:8080"
    environment:
      FALKOR_URL: redis://falkordb:6379
      CIH_GRAPH_KEY: cih
      CIH_BIND: 0.0.0.0:8080
      CIH_ARTIFACTS_DIR: /data/artifacts
      HF_HOME: /data/hf-cache
      RUST_LOG: info,cih_server=debug
    volumes:
      - cih-data:/data
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped

  # One-shot indexer — not a long-running service.
  # Set REPO_PATH in .env or your shell, then run:
  #   docker compose run --rm engine analyze /repo --all
  #   docker compose run --rm engine discover /repo
  #   docker compose run --rm engine wiki /repo --out /repo/.cih/wiki
  engine:
    image: phuchoang29/yummy-cih:latest
    entrypoint: ["cih-engine"]
    environment:
      FALKOR_URL: redis://falkordb:6379
      CIH_GRAPH_KEY: cih
    volumes:
      - ${REPO_PATH}:/repo
    depends_on:
      falkordb:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  falkordb-data:
  cih-data:
