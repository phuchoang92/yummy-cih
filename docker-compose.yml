services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379"
    environment:
      # Enable AOF so the graph is persisted continuously (~1s fsync) and survives
      # a hard power-off, not just a graceful shutdown. REDIS_ARGS is the FalkorDB
      # image's supported way to pass extra redis-server config.
      REDIS_ARGS: "--appendonly yes"
    volumes:
      # Mount the volume at the image's ACTUAL data dir (`config get dir` →
      # /var/lib/falkordb/data). The old `/data` path is not where this image
      # writes, so RDB/AOF landed on the ephemeral layer and was lost on recreate.
      - falkordb-data:/var/lib/falkordb/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Postgres + pgvector — embedding store for the `embed` command and the
  # semantic-search half of the `query` MCP tool. Host port 5433 avoids
  # conflicts with a Homebrew/local Postgres on 5432.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cih}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cih}
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cih"]
      interval: 5s
      timeout: 3s
      retries: 10

  cih-server:
    image: phuchoang29/yummy-cih:latest
    ports:
      - "8080:8080"
    environment:
      FALKOR_URL: redis://falkordb:6379
      CIH_GRAPH_KEY: cih
      CIH_BIND: 0.0.0.0:8080
      # Points at the same artifacts the engine writes — enables BM25 query tool.
      CIH_ARTIFACTS_DIR: /repo/.cih/artifacts
      # pgvector connection for semantic search (see `embed` command).
      CIH_PG_URL: postgres://${POSTGRES_USER:-cih}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cih}
      # Optional: set to protect /mcp and /graph with a bearer token
      # CIH_API_TOKEN: ${CIH_API_TOKEN}
      # Local/trusted deployment: allow the network-exposed bind without a token.
      # Remove this and set CIH_API_TOKEN to require auth.
      CIH_ALLOW_INSECURE: "1"
      # Optional: enable ask_codebase tool
      # CIH_AGENT_API_KEY: ${CIH_AGENT_API_KEY}
      HF_HOME: /data/hf-cache
      RUST_LOG: info,cih_server=debug
    volumes:
      - cih-home:/home/cih/.cih
      - cih-data:/data
      - ${REPO_PATH}:/repo:ro
    depends_on:
      falkordb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Docusaurus wiki viewer — supports multiple repos simultaneously.
  # Start with: docker compose --profile docs up -d docs-viewer
  # Open: http://localhost:3001
  #
  # Each volume mount adds one repo; the subfolder name becomes the URL prefix:
  #   /wiki/my-app  →  http://localhost:3001/my-app/
  #
  # To add more repos, append more volume lines:
  #   - /other/repo/.cih/wiki/pages:/wiki/other-repo:ro
  #
  # Single-repo mode (optional): replace CIH_WIKI_REPOS_DIR with:
  #   CIH_WIKI_PATH: /wiki
  # and mount one dir directly: - ${REPO_PATH}/.cih/wiki/pages:/wiki:ro
  docs-viewer:
    image: phuchoang29/yummy-cih-docs:latest
    build:
      context: .
      dockerfile: Dockerfile.docs-viewer
    ports:
      - "3001:3001"
    environment:
      CIH_WIKI_REPOS_DIR: /wiki
      # Live-search backend, baked into the landing page at build time and
      # fetched by the BROWSER — it must be reachable from the user's machine
      # (published cih-server port), NOT the compose-internal hostname.
      CIH_SERVER_URL: ${CIH_SERVER_URL:-http://localhost:8080}
      # 8192: the offline search index (docusaurus-search-local) OOMs a 4 GiB
      # heap on ~5k-page wikis (measured on the Fineract corpus).
      NODE_OPTIONS: --max-old-space-size=8192
    # Build the static site at startup, then serve it — avoids the webpack dev
    # server (docusaurus start) which holds ~2GB in memory and OOM-loops.
    command: sh -c "node scripts/gen-index.js && ./node_modules/.bin/docusaurus build && ./node_modules/.bin/docusaurus serve --port 3001 --host 0.0.0.0"
    volumes:
      - ${REPO_PATH}/.cih/wiki/pages:/wiki/${REPO_NAME:-repo}:ro
      # - /path/to/other-repo/.cih/wiki/pages:/wiki/other-repo:ro
    profiles: ["docs"]
    restart: unless-stopped

  # One-shot indexer — not a long-running service.
  # Set REPO_PATH in .env or your shell, then run:
  #   docker compose run --rm engine analyze /repo --all
  #   docker compose run --rm engine discover /repo
  #   docker compose run --rm engine wiki /repo --out /repo/.cih/wiki
  engine:
    image: phuchoang29/yummy-cih:latest
    entrypoint: ["cih-engine"]
    environment:
      FALKOR_URL: redis://falkordb:6379
      CIH_GRAPH_KEY: cih
      # pgvector connection for the `embed` command.
      CIH_PG_URL: postgres://${POSTGRES_USER:-cih}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cih}
    volumes:
      - cih-home:/home/cih/.cih
      - ${REPO_PATH}:/repo
    depends_on:
      falkordb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  falkordb-data:
  cih-home:
  cih-data:
  pg-data:
