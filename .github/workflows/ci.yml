name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain (channel + components) is pinned by rust-toolchain.toml.
      - name: Show toolchain
        run: rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2

      # The existing tree predates any rustfmt run (~150 files drift from default
      # style). Reported for awareness but non-blocking until a one-shot
      # `cargo fmt --all` normalization commit lands.
      # TODO: make this blocking after that commit.
      - name: Format (non-blocking)
        run: cargo fmt --all --check || true

      # Deny warnings on the crates that are warning-clean today, so the gate
      # catches *new* warnings. cih-server is included since the lib/bin
      # dedup + façade cleanup (the graph-browser UI in browser.rs/layout.rs
      # is a live, tested feature served at /graph — not dead code).
      - name: Clippy (gated crates, deny warnings)
        run: |
          cargo clippy --all-targets \
            -p cih-core \
            -p cih-graph-store \
            -p cih-falkor \
            -p cih-taint \
            -p cih-server \
            -p cih-parse \
            -p cih-search \
            -p cih-lang \
            -- -D warnings

      # The remaining crates carry a pre-existing dead_code/unused-import
      # backlog. Linted here but not gated; crates are promoted into the gated
      # job above as they are cleaned (goal: full --workspace gate).
      - name: Clippy (rest of workspace, non-blocking)
        run: cargo clippy --workspace --all-targets || true

      # No test in the workspace requires FalkorDB/Postgres — unit and
      # artifact-fixture tests (e.g. taint::tests) run without services.
      - name: Test
        run: cargo test --workspace
