name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain (channel + components) is pinned by rust-toolchain.toml.
      - name: Show toolchain
        run: rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # Layer rules from the root Cargo.toml diagram, enforced mechanically.
      - name: Crate layering
        run: python3 scripts/check_layering.py

      # The whole workspace is warning-clean; keep it that way. (The graph-
      # browser UI in cih-server's browser.rs/layout.rs is a live, tested
      # feature served at /graph — not dead code.)
      - name: Clippy (workspace, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # No test in the workspace requires FalkorDB/Postgres — unit and
      # artifact-fixture tests (e.g. taint::tests) run without services.
      - name: Test
        run: cargo test --workspace
