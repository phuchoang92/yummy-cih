# Python entry-point annotation/decorator patterns consumed by the discover pass.
# Names match the `route_annotations` prop emitted by the Python extractor (without @).

[http]
annotations = [
  "app.route", "app.get", "app.post", "app.put", "app.delete", "app.patch",
  "router.get", "router.post", "router.put", "router.delete", "router.patch",
  "blueprint.route",
]

[event]
annotations = ["task", "app.task", "shared_task", "celery.task"]

[scheduled]
annotations = ["periodic_task", "app.on_after_finalize"]
